---

extends: default

ignore:
  # Specify files or patterns to ignore
  - ".clang-format"
  - "*/.clang-format" # Ignore .clang-format files in subdirectories

rules:
  brackets:
    min-spaces-inside: 0
    max-spaces-inside: 1

  line-length:
    max: 180
    level: warning

  indentation:
    spaces: 2
    level: error

  truthy:
    ignore: |
      .github/workflows/*
