[package]
name = "abstarct_socket"
version = "0.1.0"
edition = "2024"
publish = false
categories = [
    "embedded",
    "no-std",
    "asynchronous",
    "network-programming",
    "embassy",
]

[lib]
name = "abstarct_socket"
path = "src/lib.rs"

[dependencies]
heapless = { version = "0.8", features = ["serde"] }
embassy-net = { version = "0.7.1", optional = true, features = ["tcp", "proto-ipv6", "medium-ethernet"] }

[dev-dependencies]
tokio = { version = "1.0", features = ["full"] }
tokio-test = "0.4"

[features]
default = []
std = ["embassy_net", "embassy-net/std"]
embassy_net = ["dep:embassy-net"]

# Specifies that this is a no_std library by default
[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]
