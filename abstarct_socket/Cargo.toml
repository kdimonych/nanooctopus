[package]
name = "abstarct_socket"
version = "0.1.0"
edition = "2024"
publish = false
categories = [
    "embedded",
    "no-std",
    "asynchronous",
    "network-programming",
    "embassy",
]

[lib]
name = "abstarct_socket"
path = "src/lib.rs"

[dependencies]
heapless = { version = "0.8", features = ["serde"] }
embassy-net = { version = "0.7.1", features = ["tcp", "proto-ipv6", "medium-ethernet"] }
embedded-io-async = "0.6.1"
defmt = { version = "1.0.1", optional = true }
ringbuf = {version = "0.4.8",  optional = true}

[dev-dependencies]
tokio = { version = "1.0", features = ["full"] }
tokio-test = "0.4"
ringbuf = "0.4.8"

[features]
default = []
std = ["embassy-net/std", "ringbuf/std"]
defmt = ["dep:defmt"]
mocks = ["dep:ringbuf"]

# Specifies that this is a no_std library by default
[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]
