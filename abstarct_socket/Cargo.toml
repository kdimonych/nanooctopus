[package]
name = "abstarct_socket"
version = "0.1.0"
edition = "2024"
publish = false
categories = [
    "embedded",
    "no-std",
    "asynchronous",
    "network-programming",
    "embassy",
]

[lib]
name = "abstarct_socket"
path = "src/lib.rs"

[dependencies]
heapless = { version = "0.8", features = ["serde"] }
embassy-net = { version = "0.7.1", features = [
    "tcp",
    "proto-ipv6",
    "medium-ethernet",
] }
embedded-io-async = "0.6"
defmt = { version = "1.0.1", optional = true }
ringbuf = { version = "0.4.8", optional = true }
defmt-or-log = { version = "0.2.3", default-features = false }

prefix-arena = "0.1"

[dev-dependencies]
tokio = { version = "1.0", features = ["full"] }
tokio-test = "0.4"
ringbuf = "0.4.8"

[features]
default = ["std"]
std = ["embassy-net/std", "ringbuf/std", "log"]
defmt = ["dep:defmt", "defmt-or-log/defmt"]
mocks = ["dep:ringbuf"]
log = ["defmt-or-log/log"]

# Specifies that this is a no_std library by default
[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]
