[package]
name = "nanofish"
version = "0.9.1"
edition = "2024"
description = "🐟 A lightweight, `no_std` HTTP client and server for embedded systems built on top of Embassy networking."
documentation = "https://docs.rs/nanofish"
repository = "https://github.com/rttfd/nanofish"
license = "MIT"
keywords = ["no_std", "embedded", "async", "http_client", "http_server", "websockets"]
authors = ["rttf <contact@rttf.dev>"]


[features]
default = []
tls = ["dep:embedded-tls", "dep:rand_core", "dep:rand_chacha"]
ws = ["dep:sha1", "dep:binascii", "dep:modular-bitfield", "dep:protocols"]


[dependencies]
defmt = "1.0.1"
embassy-net = { version = "0.7.1", features = [
    "defmt",
    "dns",
    "medium-ethernet",
    "proto-ipv6",
    "tcp",
] }
embassy-time = "0.5.0"
embedded-io-async = "0.6.1"
embedded-tls = { version = "0.17.0", default-features = false, optional = true }
heapless = "0.8"
rand_chacha = { version = "0.3", default-features = false, optional = true }
rand_core = { version = "0.6.4", optional = true }
# SHA-1 for no_std environments - try sha1 crate instead
sha1 = { version = "0.10", default-features = false, optional = true }
binascii = { version = "0.1.4", default-features = false, features = ["encode"], optional = true }
modular-bitfield = { version = "0.13.0", optional = true }
protocols = { path = "./protocols", default-features = false, optional = true }

[dev-dependencies]
futures-lite = "2.0"
